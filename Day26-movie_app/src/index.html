<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
    <h1 class="font-bold text-center text-lg text-red-600 sm:text-3xl">Movie Search App</h1>
    <p class="text-center w-50 mx-auto mt-4 sm:w-[450px]">Search for your favourite movie to get the details about it.</p>
    <div class="header text-center text-sm sm:text-2xl mx-auto my-8 sm:w-[500px] w-[300px] ">
        <input class="focus:outline-none w-2/3" type="text" placeholder="Enter movie name">
        <button class="w-1/3" onclick="searchMovie()">Search</button>
    </div>

    <div class="movie hidden w-[300px] sm:w-[500px] mx-auto">
        <div class="movies flex flex-col sm:flex-row items-center justify-center gap-3">
            <div class="flex  sm:flex-row sm:w-1/2 h-full items-center bg-amber-950">
                <img class="w-full object-cover" src="https://m.media-amazon.com/images/M/MV5BNWMwODYyMjQtMTczMi00NTQ1LWFkYjItMGJhMWRkY2E3NDAyXkEyXkFqcGc@._V1_SX300.jpg" alt="">
            </div>
            <div class="content text-sm sm:w-1/2 flex flex-col justify-center">
                <h1 class="text-2xl text-bold"><span id="title"></span></h1>
                <h1 class="">Genre: <span id="genre"></span></h1>
                <h1 class="my-1"><span id="plot"></span></h1>
                <h1 class="my-1">Actors: <span id="actors"></span></h1>
                <h1 class="director my-1">Director: <span id="director"></span></h1>
                <h1 class="writer my-1">Writers: <span id="writer"></span></h1>
                <h1 class="Year my-1">Original: <span id="year"></span></h1>
                <h1 class="my-1">Awards: <span id="awards"></span></h1>
                <h1 class="title">IMDB rating: <span id="imdb"></span></h1>
            </div>
        </div>
    </div>

    <div class="error text-center text-3xl"></div>
    <script src="app.js"></script>
</body>
</html>
