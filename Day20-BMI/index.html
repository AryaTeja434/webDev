<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="w-[400px] mx-auto mt-20 text-center flex flex-col items-center gap-5">
        <h1 class="font-black text-3xl text-blue-900">BMI Calculator - Body Mass Index</h1>
        <input id="height" class="w-3/4 px-7 py-3 border border-neutral-300 shadow-lg rounded-lg outline-none focus:ring-3 focus:ring-blue-300 text-xl" type="number" placeholder="Enter your height in cm" >
        <input id="weight" class="w-3/4 px-7 py-3 border border-neutral-300 shadow-lg rounded-lg outline-none focus:ring-3 focus:ring-blue-300 text-xl" type="number" placeholder="Enter your weight in kg" >
        <button class="w-4/5 m-5 bg-black text-white text-3xl py-3 rounded-full cursor-pointer" onclick="calculate()">Calculate</button>
        <p id="result" class="text-3xl font-bold text-blue-900"></p>
        <p id="condition" class="text-5xl font-bold text-blue-900"></p>
    </div>
    <p id="result"></p>
    <script src="app.js"></script>
</body>
</html>
